name: CI/CD Pipeline - BlinkLink

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Upload Repository Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configure Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Run All Tests (Unit and Integration) + JaCoCo
      - name: Run Tests with Maven
        id: maven-test
        run: mvn verify -B
        env:
          # Fake Keys and URLs for Testing
          APP_SECRET_KEY: "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ"
          APP_SECRET_TOKEN: "Clbh0TwLgaPvrUINlhzt0DKSn2NTZlF/q16zVttAXqA="
          FRONT_BASE_URL: "http://localhost:3000"
          GOOGLE_CLIENT_ID: "dummy-google-client-id"
          GOOGLE_CLIENT_SECRET: "dummy-google-client-secret"
          GITHUB_CLIENT_ID: "dummy-github-client-id"
          GITHUB_CLIENT_SECRET: "dummy-github-client-secret"

      # 4. Upload JaCoCo Coverage Report
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7

      # 5. Publish Test Reports
      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests Report
          path: target/**/*-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      # 6. Verify Docker Build
      - name: Build Docker Image
        if: steps.maven-test.outcome == 'success'
        run: docker build . --file Dockerfile --tag blink-link:latest

      # 7. Verify Prod Docker Compose
      - name: Validate Prod Compose File
        if: steps.maven-test.outcome == 'success'
        run: docker compose -f docker-compose.prod.yml config