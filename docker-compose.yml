version: '3.8'

services:
  # --- Database Service (PostgreSQL) ---
  postgres-db:
    image: postgres:17
    container_name: blinklink-pg_local
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=America/Sao_Paulo
      - PGTZ=America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - blink-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Database GUI (pgAdmin) ---
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: blinklink-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - blink-network

  # --- Cache Service (Redis) ---
  redis-cache:
    image: redis:7-alpine
    container_name: blinklink-redis_local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - blink-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  redis_data:

networks:
  blink-network:
    driver: bridge