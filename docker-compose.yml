version: '3.8'

services:
  # Serviço do Banco de Dados
  postgres-db:
    image: postgres:17
    container_name: blinklink-pg_local
    environment:
      - POSTGRES_USER=local_user
      - POSTGRES_PASSWORD=local_pass
      - POSTGRES_DB=blinklink_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - blink-network

  # --- Serviço 2: A Interface Gráfica (pgAdmin) ---
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: blinklink-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@blink.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres-db
    networks:
      - blink-network

volumes:
  pg_data:

networks:
  blink-network:
    driver: bridge