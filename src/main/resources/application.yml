spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: openid,profile,email
  application:
    name: Blink Link

  # PostgreSQL Configuration
  datasource:
    username: ${POSTGRES_USER:local_user}
    password: ${POSTGRES_PASSWORD:local_pass}
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB:blinklink_db}
    driver-class-name: org.postgresql.Driver

  # JPA + Hibernate Configuration
  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Usando o Flyway
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway (DB Migrations) Configuration
  flyway:
    enabled: true

app:
  frontend:
    oauth2-redirect-url: http://localhost:3000/dashboard
  job:
    purge-urls:
      batch-size: 5000
      sleep-millis: 100
      cron: "0 0 3 * * *"

server:
  port: 8080

blink-link:
  secret-key: ${APP_SECRET_KEY:0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ}
  base-url: ${APP_BASE_URL:http://localhost:8080/}
  secret-token: ${APP_SECRET_TOKEN:Clbh0TwLgaPvrUINlhzt0DKSn2NTZlF/q16zVttAXqA=}