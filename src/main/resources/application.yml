spring:
  application:
    name: Blink Link

  # PostgreSQL Configuration
  datasource:
    username: ${POSTGRES_USER:local_user}
    password: ${POSTGRES_PASSWORD:local_pass}
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB:blinklink_db}
    driver-class-name: org.postgresql.Driver

  # JPA + Hibernate Configuration
  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Usando o Flyway
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway (DB Migrations) Configuration
  flyway:
    enabled: true

server:
  port: 8080

blink-link:
  secret-key: ${APP_SECRET_KEY:0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ}
  base-url: ${APP_BASE_URL:http://localhost:8080/}